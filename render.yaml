# Render Blueprint Specification for OutreachFlow SaaS (Free Tier Compatible)
services:
  - type: web
    name: outreach-flow-saas
    env: node
    plan: free # Deploys on Render's 100% Free Tier
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT secret automatically
      - key: ENCRYPTION_SECRET
        generateValue: true # Generates a secure random AES-256 master key automatically
      - key: MOCK_MODE
        value: "true" # Keep simulation active by default; users can toggle or configure keys in the dashboard
    # Note: Disk mounting is disabled to support Render's Free Tier. 
    # To enable persistent databases in the future, upgrade plan to "starter" and uncomment the block below:
    # disk:
    #   name: outreach-data-vol
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
